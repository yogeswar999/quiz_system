spring.application.name=quiz-management-system
server.port=${PORT:8080}

# ---------- MySQL ----------
spring.datasource.url=jdbc:mysql://localhost:3306/quiz_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- JPA / Hibernate ----------
# Hibernate creates/updates the schema automatically on startup.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=never

# ---------- JWT ----------
jwt.secret=ThisIsADevOnlySecretKeyForJWTSigning_PleaseChangeInProduction_MinLength32
jwt.expiration.ms=86400000

# ---------- App ----------
app.default-admin.username=admin
app.default-admin.password=admin123

# ---------- CORS ----------
app.cors.allowed-origin=http://localhost:5173
