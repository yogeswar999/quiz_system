spring.application.name=quiz-management-system
server.port=${PORT:8080}

# ---------- MySQL ----------
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- JPA / Hibernate ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=never

# ---------- JWT ----------
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=86400000

# ---------- App ----------
app.default-admin.username=${APP_DEFAULT_ADMIN_USERNAME:admin}
app.default-admin.password=${APP_DEFAULT_ADMIN_PASSWORD:admin123}

# ---------- CORS ----------
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}